name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Clone on first deploy, pull on subsequent deploys
            if [ -d /opt/whatsapp-bots ]; then
              cd /opt/whatsapp-bots
              git pull origin main
            else
              git clone https://github.com/rabriol/whatsapp-bots.git /opt/whatsapp-bots
              cd /opt/whatsapp-bots
            fi

            # Write gateway .env
            cat > gateway/.env <<EOF
            NOTIFICATION_JID=${{ secrets.NOTIFICATION_JID }}
            EOF

            # Write announcement-bot .env
            cat > announcement-bot/.env <<EOF
            GOOGLE_SHEETS_ID=${{ secrets.GOOGLE_SHEETS_ID }}
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            SHEET_NAME=${{ secrets.ANNOUNCEMENT_SHEET_NAME }}
            WHATSAPP_GROUP_JID=${{ secrets.ANNOUNCEMENT_BOT_GROUP_JID }}
            GATEWAY_URL=http://whatsapp-gateway:3000
            EOF

            # Write birthday-bot .env
            cat > birthday-bot/.env <<EOF
            GOOGLE_SHEETS_ID=${{ secrets.GOOGLE_SHEETS_ID }}
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            SHEET_NAME=${{ secrets.BIRTHDAY_SHEET_NAME }}
            WHATSAPP_GROUP_JID=${{ secrets.BIRTHDAY_BOT_GROUP_JID }}
            GATEWAY_URL=http://whatsapp-gateway:3000
            EOF

            # Write weekly-announcement-bot .env
            cat > weekly-announcement-bot/.env <<EOF
            SHEET_ID=1_gwn-4tW7H4-2VBT5qM0xJAKG-ZIkvy_dEIHt9CnO6w
            GATEWAY_URL=http://whatsapp-gateway:3000
            WHATSAPP_GROUP_JID=${{ secrets.WEEKLY_BOT_GROUP_JID }}
            EOF

            # Rebuild and restart (gateway keeps auth session between deploys)
            docker compose build
            docker compose up -d
